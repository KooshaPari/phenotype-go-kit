name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'release:') || contains(github.event.head_commit.message, 'chore(release)')
    outputs:
      version: ${{steps.version.outputs.version}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -race

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --always --abbrev=7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to Go proxy
        run: |
          # Go packages are published automatically via git tags
          git tag v${{steps.version.outputs.version}}
          git push origin v${{steps.version.outputs.version}}
      

  promote:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Promote to staging
        uses: KooshaPari/phenotypeActions/promote@main
        with:
          version: ${{needs.release.outputs.version}}
          channel: beta
          registry: go_proxy
