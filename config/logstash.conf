# Logstash Pipeline Configuration
# Place in /etc/logstash/conf.d/phenotype.conf

input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
  }
}

filter {
  # Parse JSON logs
  json {
    source => "message"
    target => "phenotype"
  }

  # Extract trace ID if present
  if [phenotype][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{phenotype}[trace_id]" }
    }
  }

  # Add service metadata
  mutate {
    add_field => {
      "service" => "phenotype-go-kit"
      "environment" => "production"
    }
  }

  # Parse timestamps
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # Filter out health checks
  if [message] =~ "health_check" {
    drop { }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "phenotype-%{+YYYY.MM.dd}"
  }
}
