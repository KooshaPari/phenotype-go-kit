version: "2"

run:
  timeout: 5m

lint:
  default: none
  enable:
    - govet
    - staticcheck
    - unused

issues:
  exclude-files:
    - ".*_test\\.go$"
  exclude-rules:
    # Exclude deprecated API warnings from third-party code
    - path: "auth/jwt\\.go"
      linters:
        - staticcheck
      text: "SA1029"
    - path: "cache/redis\\.go"
      linters:
        - staticcheck
      text: "SA1019|S1001"
    - path: "oauth2/provider\\.go"
      linters:
        - staticcheck
      text: "SA1029"
    - path: "storage/gcs\\.go"
      linters:
        - staticcheck
      text: "SA1019"
    - path: "webhook/verify\\.go"
      linters:
        - staticcheck
      text: "S1017"
