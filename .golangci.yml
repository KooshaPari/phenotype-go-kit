version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - noctx
    - bodyclose
    - prealloc
    - unconvert
    - unparam
    - whitespace

linters-settings:
  gofumpt:
    extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
